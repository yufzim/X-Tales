<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Tales | Premium Cinematic Hub</title>
    <style>
        /* CSS இங்க ரொம்ப பெருசா, டீடைலா இருக்கு */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #050505; color: #fff; overflow-x: hidden; }

        /* 1. லைவ் வீடியோ பேக்ரவுண்ட் */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
            filter: brightness(0.3);
        }

        /* 2. நேவிகேஷன் */
        header { 
            position: fixed; width: 100%; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.4s; z-index: 1000;
        }
        .nav-scrolled { background: rgba(0,0,0,0.9); padding: 10px 5%; }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: 2px; color: #ff0055; }

        /* 3. ஹிரோ செக்ஷன் */
        .hero { height: 100vh; display: flex; align-items: center; padding: 0 5%; }
        .hero-content { max-width: 700px; }
        .hero h1 { font-size: 5rem; line-height: 1; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; }
        .cta-btn { 
            padding: 15px 40px; background: #ff0055; color: white; 
            border: none; font-weight: bold; cursor: pointer; border-radius: 5px;
            transition: 0.3s;
        }
        .cta-btn:hover { background: #fff; color: #ff0055; }

        /* 4. நாவல் கிரிட் (Grid) */
        .container { padding: 50px 5%; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 30px; margin-top: 40px;
        }
        .card { 
            background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;
            transition: 0.5s; cursor: pointer; border: 1px solid #333;
        }
        .card:hover { transform: translateY(-20px); border-color: #ff0055; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-body { padding: 20px; }

        /* 5. ஃபுட்டர் */
        footer { padding: 100px 5%; text-align: center; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <!-- லைவ் வீடியோ -->
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>

    <header id="navbar">
        <div class="logo">X-TALES</div>
        <nav>
            <a href="#" style="color:white; text-decoration:none; margin-left:20px;">Library</a>
            <a href="#" style="color:white; text-decoration:none; margin-left:20px;">Trending</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>FORBIDDEN TALES</h1>
            <p>Experience the most immersive interactive stories. Choices matter. Consequences are real. Enter the darkness.</p>
            <button class="cta-btn">READ NOW</button>
        </div>
    </section>

    <div class="container">
        <h2>Popular Picks</h2>
        <div class="grid">
            <!-- லூப் பண்ணி 8 கார்டுகள் -->
            <div class="card">
                <img src="https://images.unsplash.com/photo-1542382257-809252069830?q=80&w=600" alt="Novel">
                <div class="card-body"><h3>Midnight Secrets</h3></div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=600" alt="Novel">
                <div class="card-body"><h3>CEO's Game</h3></div>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=600" alt="Novel">
                <div class="card-body"><h3>Dark Desire</h3></div>
            </div>
             <div class="card">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=600" alt="Novel">
                <div class="card-body"><h3>The Contract</h3></div>
            </div>
        </div>
    </div>

    <script>
        // நேவிகேஷன் பார் ஸ்க்ரோல் எஃபெக்ட்
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if(window.scrollY > 50) nav.classList.add('nav-scrolled');
            else nav.classList.remove('nav-scrolled');
        });
    </script>

</body>
</html>
